name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.2 --activate
          pnpm -v

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Lint/test/build (turbo)
        run: pnpm check

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Buf (matching protos)
        run: |
          cd packages/protos
          go run github.com/bufbuild/buf/cmd/buf@v1.50.0 lint
          go run github.com/bufbuild/buf/cmd/buf@v1.50.0 generate
          cd ../..
          git diff --exit-code -- services/go/matching/pb

      - name: Go tests (CLI + hot-path modules)
        run: |
          go test ./...
          go build -o /dev/null ./cmd/pt
          (cd services/go/md && go test ./...)
          (cd services/go/matching && go test ./...)
