global:
  scrape_interval: 5s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["gateway:4000"]

  - job_name: md
    metrics_path: /metrics
    static_configs:
      - targets: ["md:6011"]
