name: papertrading

services:
  gateway:
    build:
      context: ..
      dockerfile: services/gateway/Dockerfile
    environment:
      GATEWAY_PORT: 4000
      MD_BASE_URL: http://md:6011
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
      OTEL_SERVICE_NAME: gateway
    ports:
      - "4000:4000"
    networks: [papertrading]
    depends_on:
      - tempo

  md:
    build:
      context: ..
      dockerfile: services/go/md/Dockerfile
    environment:
      MD_PORT: 6011
      MD_ADAPTER: ${MD_ADAPTER:-nse_replay}
      MARKET_HOLIDAYS_PATH: /etc/papertrading/holidays.json
      DATABASE_URL: postgres://${POSTGRES_USER:-papertrading}:${POSTGRES_PASSWORD:-papertrading}@postgres:5432/${POSTGRES_DB:-papertrading}?sslmode=disable
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
      OTEL_SERVICE_NAME: md
    ports:
      - "6011:6011"
    networks: [papertrading]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      tempo:
        condition: service_started

  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-papertrading}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-papertrading}
      POSTGRES_DB: ${POSTGRES_DB:-papertrading}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-papertrading} -d ${POSTGRES_DB:-papertrading}"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [papertrading]

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [papertrading]

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks: [papertrading]
    depends_on:
      - gateway
      - md

  loki:
    image: grafana/loki:3.1.1
    command: ["-config.file=/etc/loki/config.yaml"]
    ports:
      - "3100:3100"
    volumes:
      - ./loki/config.yaml:/etc/loki/config.yaml:ro
      - loki_data:/loki
    networks: [papertrading]

  promtail:
    image: grafana/promtail:3.1.1
    command: ["-config.file=/etc/promtail/config.yaml"]
    volumes:
      - ./promtail/config.yaml:/etc/promtail/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [papertrading]
    depends_on:
      - loki

  tempo:
    image: grafana/tempo:2.6.1
    command: ["-config.file=/etc/tempo/config.yaml"]
    ports:
      - "3200:3200"  # Tempo query
      - "4317:4317"  # OTLP gRPC ingest
      - "4318:4318"  # OTLP HTTP ingest
    volumes:
      - ./tempo/config.yaml:/etc/tempo/config.yaml:ro
      - tempo_data:/var/tempo
    networks: [papertrading]

  grafana:
    image: grafana/grafana:11.2.2
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks: [papertrading]
    depends_on:
      - prometheus
      - loki
      - tempo

networks:
  papertrading:
    name: papertrading

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  loki_data:
  tempo_data:
